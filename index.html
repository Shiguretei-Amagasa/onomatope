<!DOCTYPE html>
<html lang="ja">

<head>

<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<title>TEST</title>

<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<style>

body{
  margin:0;
  overflow:hidden;
}

video{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  object-fit:cover;
  z-index:-1;
}

</style>

</head>

<body>

<video
id="video"
autoplay
playsinline>
</video>

<a-scene embedded>

  <a-camera position="0 0 0"></a-camera>

</a-scene>

<script>

const scene =
document.querySelector("a-scene");

// =====================================
// 強制表示テスト
// =====================================

const text =
document.createElement("a-text");

text.setAttribute(
  "value",
  "HELLO"
);

text.setAttribute(
  "color",
  "#ff0000"
);

text.setAttribute(
  "position",
  "0 0 -2"
);

text.setAttribute(
  "scale",
  "2 2 2"
);

text.setAttribute(
  "align",
  "center"
);

scene.appendChild(text);

console.log("TEXT ADDED");

</script>

</body>
</html>
