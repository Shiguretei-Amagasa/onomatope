<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<meta
name="viewport"
content="width=device-width, initial-scale=1.0">

<!-- A-Frame -->
<script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>

<!-- AR.js -->
<script src="https://rawcdn.githack.com/AR-js-org/AR.js/master/aframe/build/aframe-ar.js"></script>

<!-- MediaPipe -->
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/pose/pose.js"></script>

<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>

<style>

body{
  margin:0;
  overflow:hidden;
  background:black;
}

video{
  display:none;
}

</style>

</head>

<body>

<video
id="video"
autoplay
playsinline>
</video>

<a-scene
embedded
renderer="colorManagement:true;"
arjs="sourceType:webcam;
      debugUIEnabled:false;">

  <!-- camera -->
  <a-entity camera></a-entity>

</a-scene>

<script>

const scene =
document.querySelector("a-scene");

const videoElement =
document.getElementById("video");

let created = false;

// =====================================
// 集中線生成
// =====================================

function createSpeedLines(parent){

  const count = 60;

  for(let i = 0; i < count; i++){

    const line =
    document.createElement("a-plane");

    // ランダム長さ
    const length =
    2 + Math.random() * 2;

    // ランダム太さ
    const width =
    0.01 + Math.random() * 0.03;

    // 放射角度
    const angle =
    (360 / count) * i;

    line.setAttribute(
      "width",
      width
    );

    line.setAttribute(
      "height",
      length
    );

    line.setAttribute(
      "color",
      "#ffffff"
    );

    line.setAttribute(
      "material",
      `
      opacity:0.7;
      transparent:true;
      side:double;
      `
    );

    line.setAttribute(
      "rotation",
      `0 0 ${angle}`
    );

    line.setAttribute(
      "position",
      "0 0 -0.2"
    );

    // 微妙に揺らす
    line.setAttribute(
      "animation",
      `
      property: rotation;
      dir: alternate;
      dur: 200;
      loop: true;
      to: 0 0 ${angle + 2}
      `
    );

    parent.appendChild(line);
  }
}

// =====================================
// ゴゴゴ生成
// =====================================

function createGogo(x, y, z){

  const root =
  document.createElement("a-entity");

  root.setAttribute(
    "position",
    `${x} ${y} ${z}`
  );

  // Billboard
  root.setAttribute(
    "look-at",
    "[camera]"
  );

  // 微振動
  root.setAttribute(
    "animation",
    `
    property: rotation;
    from: 0 0 -1;
    to: 0 0 1;
    dir: alternate;
    dur: 80;
    loop: true
    `
  );

  // =========================
  // 集中線
  // =========================

  createSpeedLines(root);

  // =========================
  // 疑似押し出し
  // =========================

  const layers = [

    {
      x:0.03,
      y:0.03,
      z:-0.06,
      color:"#000000"
    },

    {
      x:0.02,
      y:0.02,
      z:-0.04,
      color:"#000000"
    },

    {
      x:0.01,
      y:0.01,
      z:-0.02,
      color:"#000000"
    },

    {
      x:0.00,
      y:0.00,
      z:0.00,
      color:"#ffffff"
    }

  ];

  layers.forEach((l, i)=>{

    const text =
    document.createElement("a-text");

    text.setAttribute(
      "value",
      "ゴゴゴゴ"
    );

    text.setAttribute(
      "color",
      l.color
    );

    text.setAttribute(
      "position",
      `${l.x} ${l.y} ${l.z}`
    );

    text.setAttribute(
      "scale",
      "4 4 4"
    );

    text.setAttribute(
      "align",
      "center"
    );

    // 発光
    if(i === layers.length -1){

      text.setAttribute(
        "material",
        `
        emissive:#5500ff;
        emissiveIntensity:1.5;
        `
      );
    }

    root.appendChild(text);

  });

  scene.appendChild(root);
}

// =====================================
// MediaPipe
// =====================================

const pose = new Pose({

  locateFile:(file)=>{

    return
`https://cdn.jsdelivr.net/npm/@mediapipe/pose/${file}`;

  }

});

pose.setOptions({

  modelComplexity:0,

  smoothLandmarks:true,

  enableSegmentation:false,

  minDetectionConfidence:0.5,

  minTrackingConfidence:0.5

});

// =====================================
// 人物検出
// =====================================

pose.onResults(onResults);

function onResults(results){

  // 一回だけ生成
  if(created) return;

  if(!results.poseLandmarks) return;

  // 鼻位置
  const nose =
  results.poseLandmarks[0];

  if(!nose) return;

  // =================================
  // 2D → 擬似3D
  // =================================

  const x =
  (nose.x - 0.5) * 4;

  const y =
  -(nose.y - 0.5) * 3 + 1;

  const z = -3;

  createGogo(x, y, z);

  created = true;
}

// =====================================
// カメラ開始
// =====================================

const camera = new Camera(
videoElement,

{
  onFrame: async()=>{

    await pose.send({
      image:videoElement
    });

  },

  width:640,
  height:480
});

camera.start();

</script>

</body>
</html>
